<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>H2O - Réalité Augmentée</title>

  <!-- MindAR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.6.0/dist/aframe-master.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }

    /* ── Hint ── */
    #ui-hint {
      position: fixed; top: 14px; left: 0; right: 0;
      text-align: center; z-index: 999; pointer-events: none;
    }
    #ui-hint span {
      background: rgba(0,0,0,0.65); color: white;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.82rem; padding: 6px 16px;
      border-radius: 999px;
    }

    /* ── Bottom UI ── */
    #ui-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      color: white; padding: 16px 20px 24px;
      z-index: 999; pointer-events: none;
    }
    #ui-bottom .badge {
      display: inline-block; background: rgba(59,130,246,0.8);
      border-radius: 999px; font-size: 0.7rem;
      padding: 2px 10px; margin-bottom: 6px;
      font-family: 'Segoe UI', sans-serif;
    }
    #ui-bottom h1 {
      font-size: 1.2rem; font-weight: 700; margin-bottom: 3px;
      font-family: 'Segoe UI', sans-serif;
    }
    #ui-bottom p {
      font-size: 0.78rem; opacity: 0.85; line-height: 1.4;
      font-family: 'Segoe UI', sans-serif;
    }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0;
      background: #0a0d14;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.8s;
      color: white; font-family: 'Segoe UI', sans-serif;
      gap: 16px;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 44px; height: 44px;
      border: 3px solid #1e3a5a;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 0.85rem; color: #6080a0; }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Chargement du détecteur MindAR...</p>
  </div>

  <!-- Top hint -->
  <div id="ui-hint">
    <span>Pointez vers le tableau · 1 doigt = tourner · 2 doigts = zoomer</span>
  </div>

  <!-- Bottom info -->
  <div id="ui-bottom">
    <span class="badge">Chimie - Terminale</span>
    <h1>H&#x2082;O &mdash; Molécule d'eau</h1>
    <p>Géométrie <strong>coudée</strong> &middot; Angle H&ndash;O&ndash;H = 104,5° &middot; 2 doublets non liants &middot; Hybridation sp³</p>
  </div>

  <!-- ═══════════════════════════════════════════
       A-FRAME SCENE — MindAR image tracking
  ════════════════════════════════════════════ -->
  <a-scene
    mindar-image="imageTargetSrc: https://blushifting.github.io/ra-physique-chimie/test-marker.mind; autoStart: true; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.001; filterBeta: 0.01; missTolerance: 10; warmupTolerance: 5;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true; antialias: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <a-assets></a-assets>

    <!-- Camera (required by MindAR) -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- MindAR target: index 0 = première (et seule) image dans le .mind -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- Molécule H₂O — flotte au-dessus du tableau -->
      <a-entity id="molecule" scale="0.8 0.8 0.8" position="0 0 0.15" rotation="-90 0 0">

        <!-- ── Liaison O-H gauche ── -->
        <a-cylinder
          position="-0.217 -0.168 0"
          radius="0.06" height="0.52"
          rotation="0 0 -127.75"
          color="#e8e8e8"
          material="roughness:0.2; metalness:0.3; shader:standard; emissive:#555555; emissiveIntensity:0.2">
        </a-cylinder>

        <!-- ── Liaison O-H droite ── -->
        <a-cylinder
          position="0.217 -0.168 0"
          radius="0.06" height="0.52"
          rotation="0 0 127.75"
          color="#e8e8e8"
          material="roughness:0.2; metalness:0.3; shader:standard; emissive:#555555; emissiveIntensity:0.2">
        </a-cylinder>

        <!-- ── Atome O (gros, rouge vif) ── -->
        <a-sphere
          position="0 0 0"
          radius="0.28"
          color="#e63000"
          material="roughness:0.15; metalness:0.1; shader:standard; emissive:#7a1500; emissiveIntensity:0.3">
        </a-sphere>

        <!-- ── Atome H gauche (plus petit, blanc/gris) ── -->
        <a-sphere
          position="-0.435 -0.337 0"
          radius="0.14"
          color="#ffffff"
          material="roughness:0.2; metalness:0.05; shader:standard; emissive:#aaaaaa; emissiveIntensity:0.2">
        </a-sphere>

        <!-- ── Atome H droite ── -->
        <a-sphere
          position="0.435 -0.337 0"
          radius="0.14"
          color="#ffffff"
          material="roughness:0.2; metalness:0.05; shader:standard; emissive:#aaaaaa; emissiveIntensity:0.2">
        </a-sphere>

        <!-- ── Arc angle H-O-H ── -->
        <a-torus
          position="0 0 0"
          radius="0.19"
          radius-tubular="0.013"
          arc="104.5"
          rotation="90 0 -127.75"
          color="#f0b429"
          material="opacity:0.95; shader:standard; emissive:#805800; emissiveIntensity:0.4">
        </a-torus>

        <!-- ── Labels ── -->
        <a-text value="O"
          position="0.32 0.22 0.15" align="center"
          color="#ff8866" width="2.8"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>

        <a-text value="H"
          position="-0.65 -0.50 0.1" align="center"
          color="#dddddd" width="2.2"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>

        <a-text value="H"
          position="0.65 -0.50 0.1" align="center"
          color="#dddddd" width="2.2"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>


        <!-- ── Rotation lente sur Y ── -->
        <a-animation
          attribute="rotation"
          to="0 360 0"
          dur="14000"
          repeat="indefinite"
          easing="linear">
        </a-animation>

      </a-entity>
    </a-entity>

  </a-scene>

  <script>
    // Masquer l'écran de chargement une fois la scène prête
    document.querySelector('a-scene').addEventListener('loaded', function () {
      setTimeout(function () {
        var loader = document.getElementById('loading');
        if (loader) loader.classList.add('hidden');
      }, 1200);
    });

    // Rotation 1 doigt + Pinch-to-zoom 2 doigts
    AFRAME.registerComponent('touch-controls', {
      init: function () {
        this.hands     = {};
        this.lastDist  = null;
        this.lastX     = null;
        this.lastY     = null;
        // Rotation manuelle accumulée (par-dessus l'animation auto)
        this.rotY = 0;
        this.rotX = 0;
        var scene = this.el.sceneEl;
        scene.addEventListener('touchstart', this.onStart.bind(this), { passive: true });
        scene.addEventListener('touchmove',  this.onMove.bind(this),  { passive: true });
        scene.addEventListener('touchend',   this.onEnd.bind(this),   { passive: true });
      },
      onStart: function (e) {
        for (var t of e.changedTouches) this.hands[t.identifier] = t;
        var pts = Object.values(this.hands);
        if (pts.length === 1) {
          this.lastX = pts[0].clientX;
          this.lastY = pts[0].clientY;
          // Stopper l'animation auto quand l'utilisateur tourne manuellement
          var anim = document.querySelector('#molecule a-animation');
          if (anim) anim.setAttribute('dur', '0');
        }
      },
      onEnd: function (e) {
        for (var t of e.changedTouches) delete this.hands[t.identifier];
        this.lastDist = null;
        this.lastX    = null;
        this.lastY    = null;
        // Reprendre l'animation auto si plus de doigt
        if (Object.keys(this.hands).length === 0) {
          var anim = document.querySelector('#molecule a-animation');
          if (anim) anim.setAttribute('dur', '14000');
        }
      },
      onMove: function (e) {
        for (var t of e.changedTouches) this.hands[t.identifier] = t;
        var pts = Object.values(this.hands);
        var mol = document.getElementById('molecule');
        if (!mol) return;

        if (pts.length === 1) {
          // 1 doigt = rotation
          var dx = pts[0].clientX - this.lastX;
          var dy = pts[0].clientY - this.lastY;
          this.rotY += dx * 0.5;
          this.rotX += dy * 0.5;
          this.rotX = Math.max(-80, Math.min(80, this.rotX));
          mol.object3D.rotation.set(
            THREE.MathUtils.degToRad(this.rotX),
            THREE.MathUtils.degToRad(this.rotY),
            0
          );
          this.lastX = pts[0].clientX;
          this.lastY = pts[0].clientY;
        } else if (pts.length === 2) {
          // 2 doigts = zoom
          var dx2  = pts[0].clientX - pts[1].clientX;
          var dy2  = pts[0].clientY - pts[1].clientY;
          var dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
          if (this.lastDist) {
            var s      = mol.object3D.scale;
            var factor = dist / this.lastDist;
            var ns     = Math.min(Math.max(s.x * factor, 0.15), 4);
            mol.object3D.scale.set(ns, ns, ns);
          }
          this.lastDist = dist;
        }
      }
    });

    document.querySelector('a-scene').setAttribute('touch-controls', '');
  </script>

</body>
</html>
