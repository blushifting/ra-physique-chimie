<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Atome de Carbone — AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0d0d2b 0%, #0a1a3a 100%);
      z-index: 100; color: white; text-align: center; padding: 2rem;
    }
    #overlay h1 {
      font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem;
      background: linear-gradient(90deg, #4fc3f7, #81d4fa, #b3e5fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #overlay .subtitle { font-size: 0.9rem; color: #90caf9; margin-bottom: 0.4rem; }
    #version-badge {
      font-size: 0.65rem; color: rgba(79,195,247,0.6);
      letter-spacing: 0.08em; margin-bottom: 1.8rem;
      font-family: monospace;
    }
    #overlay .info-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(79,195,247,0.3);
      border-radius: 16px; padding: 1.1rem 1.4rem; margin-bottom: 1.5rem;
      max-width: 320px; font-size: 0.85rem; color: #cce5ff; line-height: 1.65;
    }
    #overlay .info-card .label {
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 0.1em; color: #4fc3f7; margin-bottom: 0.35rem;
    }
    #start-btn {
      background: linear-gradient(135deg, #1565c0, #0288d1);
      color: white; border: none; padding: 1rem 2.5rem; border-radius: 50px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 24px rgba(2,136,209,0.5); transition: transform 0.15s;
    }
    #start-btn:active { transform: scale(0.96); }
    #start-btn:disabled { opacity: 0.5; cursor: default; }

    #error-box {
      display: none; margin-top: 1rem;
      background: rgba(211,47,47,0.18); border: 1px solid #ef5350;
      border-radius: 12px; padding: 0.9rem 1.2rem;
      color: #ff8a80; font-size: 0.8rem; max-width: 310px;
      line-height: 1.5; text-align: left;
    }
    #error-box strong { color: #ff6e6e; display: block; margin-bottom: 0.3rem; }

    canvas { display: block; }

    /* ── HUD version (affiché dans la scène AR) ── */
    #ar-version {
      position: fixed; bottom: 0; right: 12px;
      font-size: 0.6rem; color: rgba(255,255,255,0.3);
      font-family: monospace; z-index: 60;
      padding-bottom: env(safe-area-inset-bottom, 4px);
      display: none; pointer-events: none;
    }

    #ui-bar {
      position: fixed; bottom: 0; left: 0; right: 0; display: none;
      flex-direction: column; align-items: center;
      padding-bottom: env(safe-area-inset-bottom, 12px);
      z-index: 50; pointer-events: none;
    }
    #hint-text {
      font-size: 0.82rem; color: rgba(255,255,255,0.92);
      background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
      padding: 0.42rem 1.1rem; border-radius: 20px; margin-bottom: 9px;
      pointer-events: none; text-align: center; max-width: 92vw;
    }
    #controls {
      display: flex; gap: 9px; flex-wrap: wrap;
      justify-content: center; pointer-events: all; padding: 0 10px 6px;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.22); color: white; border-radius: 50px;
      padding: 0.52rem 1.05rem; font-size: 0.77rem; cursor: pointer;
      transition: background 0.15s; white-space: nowrap;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.28); }
    .ctrl-btn.active { background: rgba(79,195,247,0.28); border-color: rgba(79,195,247,0.65); }

    #legend {
      position: fixed; top: 16px; right: 14px;
      background: rgba(0,0,0,0.58); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.14); border-radius: 13px;
      padding: 0.75rem 0.95rem; color: white; font-size: 0.71rem;
      display: none; z-index: 50; line-height: 1.85;
    }
    .legend-row { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

    /* Réticule DOM */
    #reticle-dom {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 54px; height: 54px;
      display: none; z-index: 40; pointer-events: none;
    }
    #reticle-dom circle.ring { fill: none; stroke-width: 2.5; transition: stroke 0.3s; }
    #reticle-dom line { stroke-width: 2; transition: stroke 0.3s; }
    #reticle-dom circle.dot { transition: fill 0.3s; }
    #reticle-dom.searching circle.ring,
    #reticle-dom.searching line { stroke: rgba(255,255,255,0.38); }
    #reticle-dom.searching circle.dot { fill: rgba(255,255,255,0.38); }
    #reticle-dom.found circle.ring,
    #reticle-dom.found line { stroke: #4fc3f7; }
    #reticle-dom.found circle.dot { fill: #4fc3f7; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    #reticle-dom.found { animation: pulse 1.1s ease-in-out infinite; }

    #move-badge {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(79,195,247,0.22); border: 1px solid rgba(79,195,247,0.55);
      color: #4fc3f7; font-size: 0.77rem; padding: 0.32rem 0.95rem;
      border-radius: 20px; display: none; z-index: 50;
      pointer-events: none; backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>⚛ Atome de Carbone</h1>
  <p class="subtitle">Modèle de Bohr — Réalité Augmentée</p>
  <p id="version-badge">v2.1 — 2026-04-24</p>

  <div class="info-card">
    <div class="label">Carbone — C (Z = 6)</div>
    Noyau : <strong>6 protons</strong> + <strong>6 neutrons</strong><br>
    Couche K : <strong>2 électrons</strong><br>
    Couche L : <strong>4 électrons</strong>
  </div>

  <button id="start-btn">Lancer la RA ▶</button>
  <div id="error-box"></div>
</div>

<svg id="reticle-dom" viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
  <circle class="ring" cx="27" cy="27" r="17"/>
  <circle class="dot"  cx="27" cy="27" r="2.4"/>
  <line x1="27" y1="4"  x2="27" y2="11"/>
  <line x1="27" y1="43" x2="27" y2="50"/>
  <line x1="4"  y1="27" x2="11" y2="27"/>
  <line x1="43" y1="27" x2="50" y2="27"/>
</svg>

<div id="move-badge">✥ Mode déplacement — touchez une surface</div>

<div id="ui-bar">
  <div id="hint-text">Balayez lentement une surface plane…</div>
  <div id="controls">
    <button class="ctrl-btn" id="btn-move">✥ Déplacer</button>
    <button class="ctrl-btn" id="btn-reset">↺ Reset</button>
    <button class="ctrl-btn" id="btn-pause">⏸ Pause</button>
    <button class="ctrl-btn" id="btn-exit">✕ Quitter</button>
  </div>
</div>

<div id="legend">
  <div class="legend-row"><span class="legend-dot" style="background:#ef5350"></span> Proton</div>
  <div class="legend-row"><span class="legend-dot" style="background:#42a5f5"></span> Neutron</div>
  <div class="legend-row"><span class="legend-dot" style="background:#ffee58"></span> Électron</div>
  <div class="legend-row"><span class="legend-dot" style="background:rgba(255,255,255,0.28);border:1px solid #999"></span> Orbite K</div>
  <div class="legend-row"><span class="legend-dot" style="background:rgba(255,255,255,0.14);border:1px solid #666"></span> Orbite L</div>
</div>

<div id="ar-version">v2.1</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

// ── Constantes géométrie ──────────────────────────────────────────
const NUCLEUS_R  = 0.018;
const ORBIT_K_R  = 0.055;
const ORBIT_L_R  = 0.10;
const ELECTRON_R = 0.008;
const PROTON_R   = 0.009;
// Décalage Y : on remonte l'atome de son rayon externe complet
// pour que la base de l'orbite L repose SUR la surface détectée
const Y_LIFT = ORBIT_L_R;

// ── State ─────────────────────────────────────────────────────────
let renderer, scene, camera, xrSession;
let atomGroup    = null;
let hitSrc       = null;
let hitRequested = false;
let reticle3D;
let surfaceFound = false;
let placed       = false;
let moveMode     = false;
let animPaused   = false;
let clock        = new THREE.Clock();

// Touch
let tx0 = 0, ty0 = 0, lastDist = 0, twoFinger = false;

// ── DOM ───────────────────────────────────────────────────────────
const overlay    = document.getElementById('overlay');
const startBtn   = document.getElementById('start-btn');
const errorBox   = document.getElementById('error-box');
const uiBar      = document.getElementById('ui-bar');
const hintText   = document.getElementById('hint-text');
const legend     = document.getElementById('legend');
const reticleDom = document.getElementById('reticle-dom');
const moveBadge  = document.getElementById('move-badge');
const arVersion  = document.getElementById('ar-version');
const btnMove    = document.getElementById('btn-move');
const btnReset   = document.getElementById('btn-reset');
const btnPause   = document.getElementById('btn-pause');
const btnExit    = document.getElementById('btn-exit');

// ── Vérification support ──────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  startBtn.textContent = 'Initialisation…';
  errorBox.style.display = 'none';

  try {
    if (!navigator.xr) throw new Error('WebXR non disponible dans ce navigateur.');

    const supported = await navigator.xr.isSessionSupported('immersive-ar');
    if (!supported) throw new Error('La session immersive-ar n\'est pas supportée.\nVérifiez que ARCore est installé et que vous utilisez Chrome.');

    await startAR();

  } catch(err) {
    showError(err);
    startBtn.disabled = false;
    startBtn.textContent = 'Réessayer ▶';
  }
});

function showError(err) {
  console.error('[AR]', err);
  errorBox.innerHTML = `<strong>⚠ Erreur AR</strong>${err.message || err}`;
  errorBox.style.display = 'block';
}

// ── Démarrage AR ──────────────────────────────────────────────────
async function startAR() {
  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Scène
  scene  = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(0.5, 1, 0.5);
  scene.add(dir);
  const pt = new THREE.PointLight(0x4fc3f7, 1.5, 0.6);
  pt.position.set(0, 0.3, 0);
  scene.add(pt);

  // Réticule 3D
  const rg = new THREE.RingGeometry(0.025, 0.038, 48);
  rg.applyMatrix4(new THREE.Matrix4().makeRotationX(-Math.PI / 2));
  reticle3D = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({
    color: 0x4fc3f7, side: THREE.DoubleSide, transparent: true, opacity: 0.85
  }));
  reticle3D.matrixAutoUpdate = false;
  reticle3D.visible = false;
  scene.add(reticle3D);

  // Petite croix centrale du réticule 3D
  const lm = new THREE.LineBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.7 });
  [[-0.02,0,0,0.02,0,0],[0,0,-0.02,0,0,0.02]].forEach(pts => {
    const g2 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(pts[0],pts[1],pts[2]),
      new THREE.Vector3(pts[3],pts[4],pts[5])
    ]);
    const ln = new THREE.Line(g2, lm);
    ln.matrixAutoUpdate = false;
    reticle3D.add(ln);
  });

  // ── Session XR ────────────────────────────────────────────────
  // IMPORTANT : on ne met PAS plane-detection dans optionalFeatures
  // car sur certains appareils/versions Chrome ça bloque silencieusement.
  // dom-overlay est en optional pour rester gracieux si non supporté.
  xrSession = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay', 'light-estimation'],
    domOverlay: { root: document.body }
  });

  renderer.xr.setReferenceSpaceType('local');
  await renderer.xr.setSession(xrSession);
  xrSession.addEventListener('end', onSessionEnd);

  // UI → mode AR
  overlay.style.display = 'none';
  uiBar.style.display = 'flex';
  legend.style.display = 'block';
  arVersion.style.display = 'block';
  reticleDom.style.display = 'block';
  reticleDom.className = 'searching';
  hintText.textContent = 'Balayez lentement une surface plane…';

  // Touch
  renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
  renderer.domElement.addEventListener('touchmove',  onTouchMove,  { passive: false });
  renderer.domElement.addEventListener('touchend',   onTouchEnd,   { passive: false });

  // Boutons
  btnMove.addEventListener('click', toggleMove);
  btnReset.addEventListener('click', () => {
    if (atomGroup) { atomGroup.rotation.set(0,0,0); atomGroup.scale.setScalar(1); }
  });
  btnPause.addEventListener('click', () => {
    animPaused = !animPaused;
    btnPause.textContent = animPaused ? '▶ Play' : '⏸ Pause';
  });
  btnExit.addEventListener('click', () => xrSession?.end());

  window.addEventListener('resize', onResize);
  renderer.setAnimationLoop(renderLoop);
}

// ── Boucle de rendu ───────────────────────────────────────────────
function renderLoop(ts, frame) {
  if (!frame) return;

  const refSpace = renderer.xr.getReferenceSpace();
  const session  = renderer.xr.getSession();

  // Hit-test source — demande unique
  if (!hitRequested) {
    session.requestReferenceSpace('viewer').then(vs =>
      session.requestHitTestSource({ space: vs }).then(src => { hitSrc = src; })
    );
    hitRequested = true;
  }

  // Hit-test actif avant placement OU en mode déplacement
  if (hitSrc && (!placed || moveMode)) {
    const results = frame.getHitTestResults(hitSrc);
    if (results.length > 0) {
      const pose = results[0].getPose(refSpace);
      reticle3D.visible = true;
      reticle3D.matrix.fromArray(pose.transform.matrix);
      if (!surfaceFound) {
        surfaceFound = true;
        reticleDom.className = 'found';
        hintText.textContent = placed
          ? 'Surface détectée — touchez pour déplacer'
          : 'Surface détectée — touchez pour placer';
      }
    } else {
      reticle3D.visible = false;
      if (surfaceFound) {
        surfaceFound = false;
        reticleDom.className = 'searching';
        hintText.textContent = 'Balayez lentement une surface plane…';
      }
    }
  }

  // Animation
  if (atomGroup && !animPaused) {
    const t = clock.getElapsedTime();
    atomGroup.rotation.y += 0.005;

    atomGroup.userData.electronsK.forEach((e, i) => {
      const a = t * 2.6 + i * Math.PI;
      e.position.set(Math.cos(a)*ORBIT_K_R, 0, Math.sin(a)*ORBIT_K_R);
    });

    atomGroup.userData.electronsL.forEach((e, i) => {
      const a    = t * 1.4 + i * (Math.PI/2);
      const tilt = (i%2===0) ? 0.38 : -0.38;
      e.position.set(Math.cos(a)*ORBIT_L_R, Math.sin(a)*tilt*ORBIT_L_R, Math.sin(a)*ORBIT_L_R);
    });

    const halo = atomGroup.userData.halo;
    if (halo) {
      const s = 1 + 0.13*Math.sin(t*2.8);
      halo.scale.setScalar(s);
      halo.material.opacity = 0.08 + 0.055*Math.sin(t*2.8);
    }
  }

  renderer.render(scene, camera);
}

// ── Placement / déplacement ───────────────────────────────────────
function placeOrMove() {
  if (!reticle3D.visible) return;

  const pos = new THREE.Vector3();
  reticle3D.matrix.decompose(pos, new THREE.Quaternion(), new THREE.Vector3());

  if (!atomGroup) {
    atomGroup = buildAtom();
    scene.add(atomGroup);
  }

  // Positionner : Y_LIFT remonte l'atome pour que sa base repose sur la surface
  atomGroup.position.set(pos.x, pos.y + Y_LIFT, pos.z);

  if (!placed) {
    placed = true;
    reticle3D.visible = false;
    reticleDom.style.display = 'none';
    hintText.textContent = '1 doigt : tourner  •  2 doigts : zoomer';
  } else if (moveMode) {
    exitMoveMode();
  }
}

function toggleMove() {
  if (!placed) return;
  moveMode = !moveMode;
  btnMove.classList.toggle('active', moveMode);
  moveBadge.style.display = moveMode ? 'block' : 'none';

  if (moveMode) {
    reticleDom.style.display = 'block';
    reticleDom.className = surfaceFound ? 'found' : 'searching';
    hintText.textContent = 'Touchez une surface pour déplacer l\'atome';
  } else {
    exitMoveMode();
  }
}

function exitMoveMode() {
  moveMode = false;
  btnMove.classList.remove('active');
  moveBadge.style.display = 'none';
  reticle3D.visible = false;
  reticleDom.style.display = 'none';
  hintText.textContent = '1 doigt : tourner  •  2 doigts : zoomer';
}

// ── Construction de l'atome ───────────────────────────────────────
function buildAtom() {
  const g = new THREE.Group();
  g.userData.electronsK = [];
  g.userData.electronsL = [];

  const nucMat = new THREE.MeshPhongMaterial({
    color: 0x90caf9, emissive: 0x1a237e, emissiveIntensity: 0.5, shininess: 80
  });
  g.add(new THREE.Mesh(new THREE.SphereGeometry(NUCLEUS_R, 32, 32), nucMat));

  const haloMat = new THREE.MeshBasicMaterial({
    color: 0x4fc3f7, transparent: true, opacity: 0.10, side: THREE.BackSide
  });
  const halo = new THREE.Mesh(new THREE.SphereGeometry(NUCLEUS_R*1.9, 24, 24), haloMat);
  g.add(halo);
  g.userData.halo = halo;

  const pMat = new THREE.MeshPhongMaterial({ color:0xef5350, shininess:100, emissive:0x7f0000, emissiveIntensity:0.3 });
  const nMat = new THREE.MeshPhongMaterial({ color:0x42a5f5, shininess:100, emissive:0x003060, emissiveIntensity:0.3 });
  const nGeo = new THREE.SphereGeometry(PROTON_R, 16, 16);
  for (let i = 0; i < 12; i++) {
    const m = new THREE.Mesh(nGeo, i < 6 ? pMat : nMat);
    const theta = (i/12)*Math.PI*2, r = NUCLEUS_R*0.55;
    const phi = (i%3===0) ? 0.32 : (i%3===1 ? -0.32 : 0);
    m.position.set(r*Math.cos(theta), r*Math.sin(phi), r*Math.sin(theta));
    g.add(m);
  }

  g.add(makeRing(ORBIT_K_R, 0xb0bec5, 0.65));
  const rL = makeRing(ORBIT_L_R, 0x78909c, 0.48);
  rL.rotation.x = 0.25;
  g.add(rL);

  const eGeo = new THREE.SphereGeometry(ELECTRON_R, 16, 16);
  const eMat = new THREE.MeshPhongMaterial({ color:0xffee58, emissive:0xf57f17, emissiveIntensity:0.85, shininess:120 });
  const makeHalo = () => new THREE.Mesh(
    new THREE.SphereGeometry(ELECTRON_R*2.3, 12, 12),
    new THREE.MeshBasicMaterial({ color:0xffee58, transparent:true, opacity:0.12, side:THREE.BackSide })
  );

  for (let i = 0; i < 2; i++) {
    const e = new THREE.Mesh(eGeo, eMat); e.add(makeHalo()); g.add(e); g.userData.electronsK.push(e);
  }
  for (let i = 0; i < 4; i++) {
    const e = new THREE.Mesh(eGeo, eMat); e.add(makeHalo()); g.add(e); g.userData.electronsL.push(e);
  }

  return g;
}

function makeRing(r, color, opacity) {
  return new THREE.Mesh(
    new THREE.TorusGeometry(r, r*0.028, 8, 80),
    new THREE.MeshBasicMateria
