<\!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>H2O - Realite Augmentee</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }

    #ui-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      color: white; padding: 16px 20px 24px;
      z-index: 999; pointer-events: none;
    }
    #ui-bottom .badge {
      display: inline-block; background: rgba(59,130,246,0.8);
      border-radius: 999px; font-size: 0.7rem;
      padding: 2px 10px; margin-bottom: 6px;
      font-family: 'Segoe UI', sans-serif;
    }
    #ui-bottom h1 {
      font-size: 1.2rem; font-weight: 700; margin-bottom: 3px;
      font-family: 'Segoe UI', sans-serif;
    }
    #ui-bottom p {
      font-size: 0.78rem; opacity: 0.85; line-height: 1.4;
      font-family: 'Segoe UI', sans-serif;
    }
    #ui-hint {
      position: fixed; top: 14px; left: 0; right: 0;
      text-align: center; z-index: 999; pointer-events: none;
    }
    #ui-hint span {
      background: rgba(0,0,0,0.65); color: white;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.82rem; padding: 6px 16px;
      border-radius: 999px;
    }
    #loading {
      position: fixed; inset: 0;
      background: #0a0d14;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.8s;
      color: white; font-family: 'Segoe UI', sans-serif;
      gap: 16px;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner {
      width: 44px; height: 44px;
      border: 3px solid #1e3a5a;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 0.85rem; color: #6080a0; }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p>Chargement du detecteur NFT...</p>
  </div>

  <div id="ui-hint"><span>Pointez vers l'image H2O imprimee</span></div>

  <div id="ui-bottom">
    <span class="badge">Chimie - Terminale</span>
    <h1>H&#x2082;O &mdash; Molecule d'eau</h1>
    <p>Geometrie <strong>coudee</strong> &middot; Angle H&ndash;O&ndash;H = 104,5&deg; &middot; 2 doublets non liants &middot; Hybridation sp&#xB3;</p>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;"
    renderer="antialias: true; logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
  >

    <a-nft
      type="nft"
      url="h2o-marker"
      smooth="true"
      smoothCount="10"
      smoothTolerance="0.01"
      smoothThreshold="5"
    >
      <a-entity id="molecule" scale="0.5 0.5 0.5">

        <a-cylinder
          position="-0.217 -0.168 0"
          radius="0.045" height="0.55"
          rotation="0 0 -127.75"
          color="#7ab3cc"
          material="roughness:0.35; metalness:0.1; shader:standard">
        </a-cylinder>

        <a-cylinder
          position="0.217 -0.168 0"
          radius="0.045" height="0.55"
          rotation="0 0 127.75"
          color="#7ab3cc"
          material="roughness:0.35; metalness:0.1; shader:standard">
        </a-cylinder>

        <a-sphere
          position="0 0 0"
          radius="0.26"
          color="#CC2200"
          material="roughness:0.2; metalness:0.08; shader:standard; emissive:#330500; emissiveIntensity:0.15">
        </a-sphere>

        <a-sphere
          position="-0.435 -0.337 0"
          radius="0.16"
          color="#c8e0f0"
          material="roughness:0.25; metalness:0.05; shader:standard; emissive:#1a3a55; emissiveIntensity:0.1">
        </a-sphere>

        <a-sphere
          position="0.435 -0.337 0"
          radius="0.16"
          color="#c8e0f0"
          material="roughness:0.25; metalness:0.05; shader:standard; emissive:#1a3a55; emissiveIntensity:0.1">
        </a-sphere>

        <a-sphere
          position="-0.276 0.215 0"
          radius="0.065"
          color="#4a9eff"
          material="opacity:0.75; transparent:true; shader:standard; emissive:#1a4a99; emissiveIntensity:0.4">
        </a-sphere>

        <a-sphere
          position="0.276 0.215 0"
          radius="0.065"
          color="#4a9eff"
          material="opacity:0.75; transparent:true; shader:standard; emissive:#1a4a99; emissiveIntensity:0.4">
        </a-sphere>

        <a-torus
          position="0 0 0"
          radius="0.18"
          radius-tubular="0.012"
          arc="104.5"
          rotation="90 0 -127.75"
          color="#f0b429"
          material="opacity:0.9; shader:standard; emissive:#604010; emissiveIntensity:0.3">
        </a-torus>

        <a-text value="O"
          position="0.22 0.18 0.1" align="center"
          color="#ff6a5e" width="2.2"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>

        <a-text value="H"
          position="-0.62 -0.42 0.1" align="center"
          color="#c8e0f0" width="1.8"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>

        <a-text value="H"
          position="0.62 -0.42 0.1" align="center"
          color="#c8e0f0" width="1.8"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>

        <a-text value="104,5"
          position="0 -0.38 0.12" align="center"
          color="#f0b429" width="1.4"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
        </a-text>

        <a-animation
          attribute="rotation"
          to="0 360 0"
          dur="14000"
          repeat="indefinite"
          easing="linear">
        </a-animation>

      </a-entity>
    </a-nft>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    document.querySelector('a-scene').addEventListener('loaded', function() {
      setTimeout(function() {
        var loader = document.getElementById('loading');
        if (loader) loader.classList.add('hidden');
      }, 1500);
    });

    AFRAME.registerComponent('gesture-detector', {
      init: function() {
        this.hands = {};
        this.lastDist = null;
        var scene = this.el.sceneEl;
        scene.addEventListener('touchstart', this.onStart.bind(this), {passive:true});
        scene.addEventListener('touchmove',  this.onMove.bind(this),  {passive:true});
        scene.addEventListener('touchend',   this.onEnd.bind(this),   {passive:true});
      },
      onStart: function(e) {
        for (var t of e.changedTouches) this.hands[t.identifier] = t;
      },
      onEnd: function(e) {
        for (var t of e.changedTouches) delete this.hands[t.identifier];
        this.lastDist = null;
      },
      onMove: function(e) {
        for (var t of e.changedTouches) this.hands[t.identifier] = t;
        var pts = Object.values(this.hands);
        if (pts.length === 2) {
          var dx = pts[0].clientX - pts[1].clientX;
          var dy = pts[0].clientY - pts[1].clientY;
          var dist = Math.sqrt(dx*dx + dy*dy);
          if (this.lastDist) {
            var mol = document.getElementById('molecule');
            if (mol) {
              var s = mol.object3D.scale;
              var factor = dist / this.lastDist;
              var ns = Math.min(Math.max(s.x * factor, 0.15), 4);
              mol.object3D.scale.set(ns, ns, ns);
            }
          }
          this.lastDist = dist;
        }
      }
    });

    document.querySelector('a-scene').setAttribute('gesture-detector', '');
  </script>

</body>
</html>
