<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molécule H₂O – Réalité Augmentée</title>

  <!-- A-Frame & AR.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }

    #info-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      color: white;
      padding: 20px 24px 28px;
      z-index: 999;
      pointer-events: none;
    }
    #info-panel h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    #info-panel p {
      font-size: 0.85rem;
      opacity: 0.8;
      line-height: 1.4;
    }
    #info-panel .badge {
      display: inline-block;
      background: rgba(59,130,246,0.7);
      border-radius: 999px;
      font-size: 0.75rem;
      padding: 2px 10px;
      margin-bottom: 8px;
    }

    #instructions {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.75);
      color: white;
      text-align: center;
      padding: 12px 16px;
      font-size: 0.82rem;
      z-index: 999;
      pointer-events: none;
      opacity: 0.9;
    }
    #instructions span {
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div id="instructions">
    <span>📄</span> Pointez la caméra vers le marqueur Hiro imprimé
  </div>

  <div id="info-panel">
    <span class="badge">Chimie – 1ère / Terminale</span>
    <h1>H₂O — Molécule d'eau</h1>
    <p>Géométrie <strong>coudée</strong> · Angle H–O–H ≈ 104,5° · 2 doublets non liants sur l'oxygène</p>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    vr-mode-ui="enabled: false"
  >
    <!-- Caméra AR -->
    <a-camera gps-camera rotation-reader></a-camera>

    <!-- Marqueur Hiro (standard AR.js, imprimable) -->
    <a-marker preset="hiro">

      <!-- ====================== MOLÉCULE H₂O ====================== -->

      <!-- OXYGÈNE (rouge, centre) -->
      <a-sphere
        position="0 0.6 0"
        radius="0.28"
        color="#E63946"
        material="roughness:0.3; metalness:0.1"
      ></a-sphere>
      <a-text
        value="O"
        position="0 1.05 0"
        align="center"
        color="white"
        width="3"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      ></a-text>

      <!-- HYDROGÈNE gauche (blanc/gris) — angle ~104.5° -->
      <!-- Position: rayon de liaison O-H = 0.96 Å, représenté ici par ~0.55 unités -->
      <!-- Angle de 52.25° de chaque côté de l'axe Y -->
      <a-sphere
        position="-0.42 0.25 0"
        radius="0.17"
        color="#E8E8E8"
        material="roughness:0.4; metalness:0.05"
      ></a-sphere>
      <a-text
        value="H"
        position="-0.42 -0.03 0"
        align="center"
        color="white"
        width="2.5"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      ></a-text>

      <!-- HYDROGÈNE droite -->
      <a-sphere
        position="0.42 0.25 0"
        radius="0.17"
        color="#E8E8E8"
        material="roughness:0.4; metalness:0.05"
      ></a-sphere>
      <a-text
        value="H"
        position="0.42 -0.03 0"
        align="center"
        color="white"
        width="2.5"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
      ></a-text>

      <!-- LIAISONS O-H (cylindres) -->
      <!-- Liaison gauche : entre O (0,0.6,0) et H (-0.42,0.25,0) -->
      <a-cylinder
        position="-0.21 0.425 0"
        radius="0.045"
        height="0.52"
        color="#AAAAAA"
        rotation="0 0 40"
        material="roughness:0.5"
      ></a-cylinder>
      <!-- Liaison droite -->
      <a-cylinder
        position="0.21 0.425 0"
        radius="0.045"
        height="0.52"
        color="#AAAAAA"
        rotation="0 0 -40"
        material="roughness:0.5"
      ></a-cylinder>

      <!-- DOUBLETS NON LIANTS (petites sphères bleutées au-dessus de O) -->
      <a-sphere
        position="-0.22 0.92 0"
        radius="0.07"
        color="#60A5FA"
        material="opacity:0.85; transparent:true"
      ></a-sphere>
      <a-sphere
        position="0.22 0.92 0"
        radius="0.07"
        color="#60A5FA"
        material="opacity:0.85; transparent:true"
      ></a-sphere>
      <!-- Labels doublets -->
      <a-text
        value="doublets\nnon liants"
        position="0.55 1.05 0"
        align="left"
        color="#93C5FD"
        width="2.2"
      ></a-text>

      <!-- ANGLE H-O-H (arc indicatif) -->
      <a-torus
        position="0 0.6 0"
        radius="0.28"
        radius-tubular="0.012"
        arc="105"
        rotation="0 0 -52"
        color="#FBBF24"
        material="opacity:0.9"
      ></a-torus>
      <a-text
        value="104,5°"
        position="0 0.2 0"
        align="center"
        color="#FCD34D"
        width="2"
      ></a-text>

      <!-- ANIMATION rotation lente de toute la molécule -->
      <a-entity
        id="molecule-pivot"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"
        position="0 0 0"
      >
        <!-- Ombre / socle -->
        <a-circle
          position="0 0.01 0"
          radius="0.6"
          rotation="-90 0 0"
          color="#1a1a2e"
          material="opacity:0.4; transparent:true"
        ></a-circle>
      </a-entity>

    </a-marker>

  </a-scene>

</body>
</html>
