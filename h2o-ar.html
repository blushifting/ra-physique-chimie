<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>H₂O – Réalité Augmentée</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; }
    #ui-bottom {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
      color: white; padding: 16px 20px 22px;
      z-index: 999; pointer-events: none;
    }
    #ui-bottom .badge {
      display: inline-block; background: rgba(59,130,246,0.8);
      border-radius: 999px; font-size: 0.7rem;
      padding: 2px 10px; margin-bottom: 5px;
      font-family: 'Segoe UI', sans-serif;
    }
    #ui-bottom h1 {
      font-size: 1.2rem; font-weight: 700; margin-bottom: 2px;
      font-family: 'Segoe UI', sans-serif;
    }
    #ui-bottom p {
      font-size: 0.78rem; opacity: 0.85; line-height: 1.4;
      font-family: 'Segoe UI', sans-serif;
    }
    #ui-hint {
      position: fixed; top: 12px; left: 0; right: 0;
      text-align: center; z-index: 999; pointer-events: none;
    }
    #ui-hint span {
      background: rgba(0,0,0,0.6); color: white;
      font-family: 'Segoe UI', sans-serif;
      font-size: 0.8rem; padding: 5px 14px;
      border-radius: 999px;
    }
  </style>
</head>
<body>

  <div id="ui-hint"><span>📄 Pointez vers le marqueur Hiro</span></div>

  <div id="ui-bottom">
    <span class="badge">Chimie – Terminale</span>
    <h1>H₂O — Molécule d'eau</h1>
    <p>Géométrie <strong>coudée</strong> · Angle H–O–H ≈ 104,5° · 2 doublets non liants</p>
  </div>

  <a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
    renderer="antialias: true; logarithmicDepthBuffer: true;"
    vr-mode-ui="enabled: false"
    gesture-detector
  >
    <a-marker preset="hiro" smooth="true" smoothCount="5" smoothTolerance="0.01" smoothThreshold="2">

      <a-entity id="molecule" gesture-handler="minScale: 0.3; maxScale: 5">

        <a-sphere position="0 0.4 0" radius="0.28" color="#C0392B"
          material="roughness:0.25; metalness:0.05; shader:standard"></a-sphere>

        <a-sphere position="-0.435 0.063 0" radius="0.16" color="#ECF0F1"
          material="roughness:0.3; metalness:0.05; shader:standard"></a-sphere>

        <a-sphere position="0.435 0.063 0" radius="0.16" color="#ECF0F1"
          material="roughness:0.3; metalness:0.05; shader:standard"></a-sphere>

        <a-cylinder position="-0.217 0.232 0" radius="0.05" height="0.55"
          color="#BDC3C7" rotation="0 0 52.2"
          material="roughness:0.4; shader:standard"></a-cylinder>

        <a-cylinder position="0.217 0.232 0" radius="0.05" height="0.55"
          color="#BDC3C7" rotation="0 0 -52.2"
          material="roughness:0.4; shader:standard"></a-cylinder>

        <a-sphere position="-0.32 0.7 0" radius="0.07" color="#3498DB"
          material="opacity:0.8; transparent:true; shader:standard"></a-sphere>
        <a-sphere position="0.32 0.7 0" radius="0.07" color="#3498DB"
          material="opacity:0.8; transparent:true; shader:standard"></a-sphere>

        <a-torus position="0 0.4 0" radius="0.2" radius-tubular="0.012"
          arc="105" rotation="0 0 -52.2" color="#F39C12"
          material="opacity:0.9; shader:standard"></a-torus>

        <a-text value="O" position="0.05 0.7 0.1" align="center" color="#E74C3C"
          width="2.5" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
        <a-text value="H" position="-0.55 -0.05 0.1" align="center" color="white"
          width="2" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
        <a-text value="H" position="0.55 -0.05 0.1" align="center" color="white"
          width="2" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
        <a-text value="104,5°" position="0 0.1 0.1" align="center" color="#F39C12"
          width="1.6" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
        <a-text value="doublets" position="0.48 0.82 0.1" align="left" color="#5DADE2"
          width="1.5" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>

        <a-animation attribute="rotation" to="0 360 0" dur="14000"
          repeat="indefinite" easing="linear"></a-animation>

      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    AFRAME.registerComponent('gesture-detector', {
      schema: { element: { default: '' } },
      init: function() {
        this.targetEl = this.el;
        this.hands = {};
        this.lastDist = null;
        this.el.sceneEl.addEventListener('touchstart', this.onTouchStart.bind(this), {passive:true});
        this.el.sceneEl.addEventListener('touchmove',  this.onTouchMove.bind(this),  {passive:true});
        this.el.sceneEl.addEventListener('touchend',   this.onTouchEnd.bind(this),   {passive:true});
      },
      onTouchStart: function(e) {
        for (let t of e.changedTouches) this.hands[t.identifier] = t;
      },
      onTouchEnd: function(e) {
        for (let t of e.changedTouches) delete this.hands[t.identifier];
        this.lastDist = null;
      },
      onTouchMove: function(e) {
        for (let t of e.changedTouches) this.hands[t.identifier] = t;
        const pts = Object.values(this.hands);
        if (pts.length === 2) {
          const dx = pts[0].clientX - pts[1].clientX;
          const dy = pts[0].clientY - pts[1].clientY;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (this.lastDist) {
            const mol = document.getElementById('molecule');
            if (mol) {
              const s = mol.object3D.scale;
              const factor = dist / this.lastDist;
              const ns = Math.min(Math.max(s.x * factor, 0.2), 6);
              mol.object3D.scale.set(ns, ns, ns);
            }
          }
          this.lastDist = dist;
        }
      }
    });

    AFRAME.registerComponent('gesture-handler', {
      schema: { minScale: {default:0.3}, maxScale: {default:5} },
      init: function() {}
    });
  </script>

</body>
</html>
